services:
  - type: web
    name: auctionops
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn dashboard:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: auctionops-db
          property: connectionString
      - key: OWNER_EMAIL
        value: zilinski.21@gmail.com
      - key: OWNER_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: zilinski.21@gmail.com
      - key: FROM_EMAIL
        value: zilinski.21@gmail.com
      - key: SMTP_PASSWORD
        sync: false

databases:
  - name: auctionops-db
    plan: free
